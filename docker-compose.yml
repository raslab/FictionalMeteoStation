services:
  redpanda:
    image: redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  spark:
    image: apache/spark:3.5.8-scala2.12-java17-python3-r-ubuntu
    ports:
      - "4040:4040"
    command: ["/opt/spark/bin/spark-shell"]

  rover-emulator:
    build: ./src/RoverEmulator
    environment:
      Kafka__BootstrapServers: redpanda:9092
      Simulation__OriginLat: 52.2297
      Simulation__OriginLon: 21.0122
      Simulation__InitialRoverCount: 8
    depends_on:
      - redpanda

  dashboard:
    build: ./src/FleetDashboard
    environment:
      Redis__Configuration: redis:6379
    ports:
      - "8088:8080"
    depends_on:
      - redis